<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strider Labs — Action Layer for Personal AI Agents</title>
  <meta name="description" content="Strider makes personal AI agents actually useful. Execute real-world actions — groceries, reservations, email — through one integration.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { max-width: 600px; text-align: center; }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
    .tagline { font-size: 1.25rem; color: #888; margin-bottom: 2rem; }
    .description { font-size: 1.1rem; line-height: 1.7; color: #aaa; margin-bottom: 2rem; }
    .status {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #333;
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      color: #888;
    }
    .status span { color: #4ade80; }
    footer { margin-top: 4rem; color: #444; font-size: 0.85rem; }
    a { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🗡️</div>
    <h1>Strider Labs</h1>
    <p class="tagline">Action layer for personal AI agents</p>
    <p class="description">
      Your AI agent can think and plan — but it can't order groceries, make reservations, or send emails. Strider closes that gap. One integration. Every action your agent needs. Just works.
    </p>
    <div class="status">
      <span>●</span> Building in the open — launching soon
    </div>
  </div>
  <footer>
    <a href="https://github.com/markswendsen-code/striderlabs.ai">GitHub</a>
  </footer>
</body>
</html>
